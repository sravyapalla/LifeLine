name: LifeLine CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - feature/**

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test backend
        working-directory: backend
        run: mvn test

  services:
    name: Service reactor tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test services
        working-directory: services
        run: mvn test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_REPLACE_REGISTRY_HOST: always
      NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Guard public npm lockfile
        run: |
          if grep -Eiq "oraclecorp|artifactory|artifacthub" frontend/package-lock.json; then
            echo "::error::frontend/package-lock.json contains private registry URLs. Regenerate it against https://registry.npmjs.org/ before opening a PR."
            exit 1
          fi
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-online
      - name: Build frontend
        working-directory: frontend
        run: npm run build
