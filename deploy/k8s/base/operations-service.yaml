apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-service
  namespace: lifeline
  labels:
    app.kubernetes.io/name: operations-service
    app.kubernetes.io/part-of: lifeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: operations-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operations-service
        app.kubernetes.io/part-of: lifeline
    spec:
      containers:
        - name: operations-service
          image: lifeline/operations-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: lifeline-config
            - secretRef:
                name: lifeline-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: operations-service
  namespace: lifeline
spec:
  selector:
    app.kubernetes.io/name: operations-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
