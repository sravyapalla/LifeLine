apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-service
  namespace: lifeline
  labels:
    app.kubernetes.io/name: incident-service
    app.kubernetes.io/part-of: lifeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: incident-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: incident-service
        app.kubernetes.io/part-of: lifeline
    spec:
      containers:
        - name: incident-service
          image: lifeline/incident-service:latest
          ports:
            - containerPort: 8091
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-service
  namespace: lifeline
spec:
  selector:
    app.kubernetes.io/name: incident-service
  ports:
    - name: http
      port: 8091
      targetPort: 8091
---
