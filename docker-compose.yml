services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lifeline-postgres
    environment:
      POSTGRES_DB: ${LIFELINE_DB_NAME:-lifeline}
      POSTGRES_USER: ${LIFELINE_DB_USERNAME:-lifeline}
      POSTGRES_PASSWORD: ${LIFELINE_DB_PASSWORD:?Set LIFELINE_DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LIFELINE_DB_USERNAME:-lifeline} -d ${LIFELINE_DB_NAME:-lifeline}"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: lifeline-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  kafka:
    image: apache/kafka:3.8.0
    container_name: lifeline-kafka
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  operations-service:
    build:
      context: ./backend
    container_name: lifeline-operations-service
    environment:
      LIFELINE_DB_URL: jdbc:postgresql://postgres:5432/${LIFELINE_DB_NAME:-lifeline}
      LIFELINE_DB_USERNAME: ${LIFELINE_DB_USERNAME:-lifeline}
      LIFELINE_DB_PASSWORD: ${LIFELINE_DB_PASSWORD:?Set LIFELINE_DB_PASSWORD in .env}
      LIFELINE_REDIS_HOST: redis
      LIFELINE_REDIS_PORT: 6379
      LIFELINE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LIFELINE_JWT_SECRET: ${LIFELINE_JWT_SECRET:?Set LIFELINE_JWT_SECRET in .env}
      LIFELINE_DEMO_PASSWORD: ${LIFELINE_DEMO_PASSWORD:?Set LIFELINE_DEMO_PASSWORD in .env}
      LIFELINE_ALLOWED_ORIGINS: ${LIFELINE_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12

  gateway-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: gateway-service
    container_name: lifeline-gateway-service
    environment:
      LIFELINE_ALLOWED_ORIGINS: ${LIFELINE_ALLOWED_ORIGINS:-http://localhost:5173}
      LIFELINE_OPERATIONS_URL: http://operations-service:8080
      LIFELINE_INCIDENT_URL: http://incident-service:8091
      LIFELINE_RESOURCE_URL: http://resource-service:8092
      LIFELINE_DISPATCH_URL: http://dispatch-service:8093
      LIFELINE_NOTIFICATION_URL: http://notification-service:8094
      LIFELINE_AUDIT_URL: http://audit-service:8095
      LIFELINE_SIMULATION_URL: http://simulation-service:8096
    ports:
      - "8088:8088"
    depends_on:
      operations-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12

  incident-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: incident-service
    container_name: lifeline-incident-service
    ports:
      - "8091:8091"

  resource-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: resource-service
    container_name: lifeline-resource-service
    ports:
      - "8092:8092"

  dispatch-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: dispatch-service
    container_name: lifeline-dispatch-service
    ports:
      - "8093:8093"

  notification-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: notification-service
    container_name: lifeline-notification-service
    ports:
      - "8094:8094"

  audit-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: audit-service
    container_name: lifeline-audit-service
    ports:
      - "8095:8095"

  simulation-service:
    build:
      context: ./services
      dockerfile: Dockerfile
      args:
        SERVICE: simulation-service
    container_name: lifeline-simulation-service
    ports:
      - "8096:8096"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8088/api
    container_name: lifeline-frontend
    ports:
      - "5173:80"
    depends_on:
      gateway-service:
        condition: service_healthy

volumes:
  postgres-data:
  kafka-data:
